<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="heading"> STONE  PAPER  SCISSOR</h1> 
    <div id="choices">
        <div class="choice" id="stone">
            <img src="SPS/stone.jpeg" alt="Stone" >
        </div>
        <div class="choice" id="paper">
            <img src="SPS/paper.jpeg" alt="Paper">
        </div>
        <div class="choice" id="scissor">
            <img src="SPS/scissor.jpeg" alt="Scissor" >
        </div>
    </div>
    <div id="scores">
        <div class="score">YOU : <span id="user-score">0</span></div>
        <div class="score">COMPUTER : <span id="computer-score">0</span></div>
    </div>
    <p id="message"></p>
    <p id="result"></p>
    <button id="new-game">NEW GAME</button>

    <script src="script.js"></script>

</body>
</html>
